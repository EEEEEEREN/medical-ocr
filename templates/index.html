<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical OCR | 智能病例识别</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
        .history-card:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-gray-800 dark:text-gray-200 min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">
                    Medical OCR
                </h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:ring-2 ring-blue-500/50 transition-all">
                    <span id="theme-toggle-light-icon" class="hidden dark:block text-xl">☀️</span>
                    <span id="theme-toggle-dark-icon" class="block dark:hidden text-xl">🌙</span>
                </button>
                <button id="output-lang-toggle" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                    切换显示语言
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-[1600px] mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-10 gap-6">
        
        <div class="lg:col-span-4 flex flex-col gap-6">
            <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] border border-gray-200 dark:border-gray-800 p-8 shadow-sm flex-1 flex flex-col">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>上传病例图片
                </h2>
                
                <div id="dropzone" class="flex-1 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-[2rem] flex flex-col items-center justify-center p-10 hover:border-blue-500 hover:bg-blue-50/30 dark:hover:bg-blue-900/10 transition-all cursor-pointer group">
                    <input id="file-input" type="file" class="hidden" accept="image/*">
                    <div class="w-20 h-20 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                        <span class="text-4xl">📂</span>
                    </div>
                    <p class="text-gray-600 dark:text-gray-400 font-semibold text-lg">点击或拖拽至此处</p>
                    <p class="text-sm text-gray-400 mt-2">支持高清图片上传</p>
                    <button id="select-file-btn" class="mt-8 px-8 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm rounded-2xl text-sm font-bold hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        浏览本地文件
                    </button>
                </div>

                <div id="preview-container" class="mt-8 hidden">
                    <p class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">图片预览</p>
                    <img id="preview-image" class="w-full rounded-[1.5rem] border border-gray-200 dark:border-gray-800 shadow-md">
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 flex flex-col gap-6">
            <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] border border-gray-200 dark:border-gray-800 p-8 shadow-sm flex-1 flex flex-col min-h-[600px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-emerald-500 rounded-full"></span>识别与分析
                    </h2>
                    <button id="copy-btn" class="px-4 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg text-xs font-bold transition-colors">复制全文</button>
                </div>
                
                <div id="status-bar" class="hidden mb-4 p-4 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-2xl text-xs font-bold animate-pulse flex items-center gap-2">
                    <span>🚀 AI 正在处理医疗文档...</span>
                </div>

                <div class="flex-1 bg-slate-50 dark:bg-slate-950/50 rounded-[1.5rem] p-6 text-[15px] leading-relaxed custom-scroll overflow-y-auto whitespace-pre-wrap font-medium">
                    <div id="result-content" class="text-gray-600 dark:text-gray-300">等待上传病例进行识别...</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-6">
            <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] border border-gray-200 dark:border-gray-800 p-6 shadow-sm h-full max-h-[850px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-sm tracking-tight">历史记录</h3>
                    <button id="refresh-history" class="p-1 hover:text-blue-500 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto space-y-3 custom-scroll pr-1">
                    </div>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
