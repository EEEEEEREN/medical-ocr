<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical OCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        .history-card:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b dark:border-gray-800 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 2a2 2 0 00-2 2v8a2 2 0 002 2h6a2 2 0 002-2V6.414A2 2 0 0016.414 5L14 2.586A2 2 0 0012.586 2H9z" />
                    <path d="M3 8a2 2 0 012-2v10h8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
                </svg>
                <h1 class="text-xl font-bold tracking-tight">Medical OCR</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:ring-2 ring-blue-500 transition-all">
                    <span id="theme-icon-dark" class="hidden dark:block text-lg">☀️</span>
                    <span id="theme-icon-light" class="block dark:hidden text-lg">🌙</span>
                </button>
                <button id="output-lang-toggle" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold shadow-lg transition-all active:scale-95">
                    切换显示语言
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-[1600px] mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-10 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white dark:bg-gray-900 rounded-[2rem] border dark:border-gray-800 p-8 shadow-sm h-full flex flex-col">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-1 h-5 bg-blue-600 rounded-full"></span> 上传病例
                </h2>
                <div id="dropzone" class="flex-1 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-3xl flex flex-col items-center justify-center p-10 hover:border-blue-500 hover:bg-blue-50/30 dark:hover:bg-blue-900/10 transition-all cursor-pointer group">
                    <input id="file-input" type="file" class="hidden" accept="image/*">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📤</div>
                    <p class="text-gray-500 dark:text-gray-400 font-medium">拖拽图片到这里</p>
                    <p class="text-xs text-gray-400 mt-2">支持 JPG, PNG 格式</p>
                    <button id="select-file-btn" class="mt-6 px-8 py-3 bg-white dark:bg-gray-800 border dark:border-gray-700 shadow-sm rounded-2xl text-sm font-bold hover:bg-gray-50 transition-colors">
                        浏览本地文件
                    </button>
                </div>
                <div id="preview-container" class="mt-6 hidden">
                    <div class="relative group">
                        <img id="preview-image" class="w-full rounded-2xl border dark:border-gray-700 shadow-lg">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity rounded-2xl flex items-center justify-center text-white text-xs">预览图</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="bg-white dark:bg-gray-900 rounded-[2rem] border dark:border-gray-800 p-8 shadow-sm h-full flex flex-col min-h-[600px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="w-1 h-5 bg-emerald-500 rounded-full"></span> 分析结果
                    </h2>
                    <button id="copy-btn" class="px-4 py-1.5 bg-gray-100 dark:bg-gray-800 rounded-lg text-xs font-bold hover:text-blue-500">复制</button>
                </div>
                <div id="status-bar" class="hidden mb-4 p-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-xl text-xs animate-pulse">
                    🚀 AI 正在处理您的医疗文档...
                </div>
                <div id="result-content" class="flex-1 bg-gray-50 dark:bg-gray-800/50 rounded-2xl p-6 text-[15px] leading-relaxed custom-scroll overflow-y-auto whitespace-pre-wrap font-medium">
                    等待文件上传...
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white dark:bg-gray-900 rounded-[2rem] border dark:border-gray-800 p-6 shadow-sm h-full max-h-[800px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-sm">历史记录</h3>
                    <button id="refresh-history" class="text-xs text-blue-500">刷新</button>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto space-y-3 custom-scroll pr-1">
                    </div>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
