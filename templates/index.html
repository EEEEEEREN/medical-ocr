<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病例智能识别系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
    
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-blue-50 dark:from-gray-950 dark:to-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md shadow-sm border-b border-gray-200/50 dark:border-gray-800/50 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">病例识别系统</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <text>🌓</text>
                </button>
                <button id="output-lang-toggle" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-all shadow-md">
                    <span id="lang-text">切换至英文</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-10 grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 p-8">
            <h2 class="text-xl font-bold mb-6">上传病例图片</h2>
            <div id="dropzone" class="border-2 border-dashed border-blue-200 dark:border-blue-800 rounded-2xl p-10 text-center cursor-pointer hover:border-blue-400 transition-all bg-blue-50/30 dark:bg-blue-900/10">
                <input id="file-input" type="file" accept="image/*" class="hidden">
                <div class="flex flex-col items-center">
                    <p class="text-gray-600 dark:text-gray-400 mb-4">点击或拖拽图片到这里</p>
                    <button id="select-file-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-md">选择文件</button>
                </div>
            </div>
            <div id="preview-container" class="mt-8 hidden">
                <img id="preview-image" class="w-full rounded-xl shadow-lg max-h-96 object-contain">
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 p-8 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">识别结果</h2>
                <button id="copy-btn" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm shadow-md transition-colors">复制全文</button>
            </div>
            <div id="status-bar" class="hidden flex items-center gap-3 mb-4 text-blue-600">
                <span id="status-text">处理中...</span>
            </div>
            <div id="result-content" class="flex-1 bg-gray-50 dark:bg-gray-900 rounded-xl p-6 overflow-y-auto min-h-[300px] border border-gray-100 dark:border-gray-800">
                <p class="text-gray-400 italic text-center py-20">等待识别结果...</p>
            </div>
        </div>
    </main>

    <script src="/static/js/script.js"></script>
</body>
</html>
