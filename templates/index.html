<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病例智能识别系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .whitespace-pre-wrap { word-break: break-word; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md shadow-sm border-b dark:border-gray-800 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg text-white font-bold text-xl">病</div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">病例识别系统</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400 hover:scale-110 transition-transform">
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
                <button id="output-lang-toggle" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-md active:scale-95 transition-all">
                    <span id="lang-text">切换语言</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-10 grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border dark:border-gray-700 p-8">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">上传图片</h2>
            <div id="dropzone" class="border-2 border-dashed border-blue-200 dark:border-blue-800 rounded-2xl p-10 text-center cursor-pointer transition-all bg-blue-50/30">
                <input id="file-input" type="file" accept="image/*" class="hidden">
                <p class="text-gray-600 dark:text-gray-400 mb-4 font-medium">点击或拖拽图片到这里</p>
                <button id="select-file-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-md">选择文件</button>
            </div>
            <div id="preview-container" class="mt-8 hidden">
                <img id="preview-image" class="w-full rounded-xl shadow-lg max-h-96 object-contain border dark:border-gray-700">
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border dark:border-gray-700 p-8 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">结果展示</h2>
                <button id="copy-btn" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm shadow-md">复制内容</button>
            </div>
            <div id="status-bar" class="hidden p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg mb-4 text-blue-600 dark:text-blue-400 text-sm font-medium">
                <span id="status-text">就绪</span>
            </div>
            <div id="result-content" class="flex-1 bg-gray-50 dark:bg-gray-900 rounded-xl p-6 overflow-y-auto min-h-[300px] border dark:border-gray-800">
                <p class="text-gray-400 italic text-center py-20">等待识别结果...</p>
            </div>
        </div>
    </main>

    <script src="/static/js/script.js?v=4.0"></script>
</body>
</html>
